  lambda_aux_regression: 0.1
  lambda_direct_regression: 0.0
  lambda_subdiv: 0.02
  lambda_kl: 1.0e-6
  lambda_consistency: 0.05
  consistency_max_pairs: 100000
optim:
  lr: 2.0e-4
  weight_decay: 1.0e-2
